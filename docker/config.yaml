# Groktobench — Minimal Hermes Agent Configuration
#
# This config is overwritten at container startup by init.sh which reads
# GROKTOBENCH_API_KEY, GROKTOBENCH_MODEL, and GROKTOBENCH_BASE_URL env vars.
#
# IMPORTANT: No custom skills, no custom providers, no personal data.

model:
  provider: openrouter
  model: "deepseek-v4-flash"

providers:
  openrouter:
    base_url: "https://openrouter.ai/api/v1"

# --- Disable auxiliary models for clean evaluation ---
auxiliary:
  compression: null
  vision: null
  approval: null
  memory: null
  title_generation: null
  curator: null
  goal_judge: null

# --- No custom memory providers ---
memory:
  provider: builtin
  builtin:
    max_entries: 100

# --- Kanban enabled for orchestration ---
kanban:
  enabled: true
  board: default
