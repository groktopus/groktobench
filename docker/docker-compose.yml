# Groktobench — docker-compose.yml
#
# Spins up a clean-room Hermes Agent container with stock skills only.
# The model under test and its API key are provided via:
#   1. An .env file mounted at /opt/data/.env (API key lives here)
#   2. Model and provider configured by init.sh at boot
#
# Usage:
#   cp /path/to/your/hermes/.env ./.env   # your real API key file
#   docker compose -f docker/docker-compose.yml up -d
#
# Test:
#   docker exec groktobench-hermes hermes -z "hello" --skills "" --yolo

services:
  hermes:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: groktobench-hermes:latest
    container_name: groktobench-run
    environment:
      - HERMES_HOME=/opt/data
      - HOME=/opt/data
    volumes:
      - groktobench_data:/opt/data
      - ./.env:/opt/data/.env:ro   # SCP'd from local machine; Hermes reads this
    stdin_open: true
    tty: true
    command: /opt/hermes/groktobench-init.sh

volumes:
  groktobench_data:
